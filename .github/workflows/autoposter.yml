name: AffanMarvel Auto-Poster

on:
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run Auto-Poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit articles.json and posted_urls.txt
        run: |
          git config user.name  "affanmarvel-bot"
          git config user.email "bot@affanmarvel.in"
          git add articles.json posted_urls.txt
          git diff --staged --quiet || git commit -m "chore: update articles and posted URLs [skip ci]"
          git push

name: AffanMarvel Auto-Poster

on:
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run Auto-Poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Save articles to repo
        run: |
          git config user.name  "affanmarvel-bot"
          git config user.email "bot@affanmarvel.in"
          git add -f articles.json posted_urls.txt
          git commit -m "chore: update articles [skip ci]" || echo "Nothing to commit"
          git push --force origin main
